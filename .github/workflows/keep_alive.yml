name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # Usa -L per seguire i reindirizzamenti e --retry per insistere
          curl -L --retry 3 --retry-delay 10 --max-time 30 https://escursionesospensioni.streamlit.app
